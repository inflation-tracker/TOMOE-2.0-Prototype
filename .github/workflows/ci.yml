name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml-service:
    name: ML service (pytest + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest
      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true   # report-only for now

  ingestion:
    name: Ingestion (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest

  frontend:
    name: Frontend (typecheck + lint + build + npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-build-placeholder
      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high || true   # report-only for now
